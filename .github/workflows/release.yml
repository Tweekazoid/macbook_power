name: Release

on:
  push:
    branches: [main]      # auto-release on every merge to main
    tags:
      - "v*"              # and on manual version tags
  workflow_dispatch:      # allow manual run from GitHub UI

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v$(python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Check if tag already exists
        id: tag_check
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.version }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.version }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release name
        id: relname
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          VER="${{ steps.version.outputs.version }}"
          HEADLINE=""
          # 1) Prefer a headline from CHANGELOG.md line like: "## v0.1.1 — Apple Silicon CPU temps"
          if [[ -f CHANGELOG.md ]]; then
            HEADLINE=$(awk -v v="${VER}" '
              $0 ~ "^##[[:space:]]+"v"([[:space:]]|$)" {
                sub("^##[[:space:]]+"v"[[:space:]]*[—–-]*[[:space:]]*", "");
                print; exit
              }' CHANGELOG.md | tr -d '\r')
          fi
          # 2) Fallback to the latest commit subject on main
          if [[ -z "${HEADLINE}" ]]; then
            HEADLINE=$(git log -1 --pretty=%s)
          fi
          # 3) Sanitise
          HEADLINE=$(echo "${HEADLINE}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
          # Build final name: "MacBook Power v0.1.1 — <headline>"
          if [[ -n "${HEADLINE}" && "${HEADLINE}" != "${VER}" ]]; then
            TITLE="MacBook Power ${VER} — ${HEADLINE}"
          else
            TITLE="MacBook Power ${VER}"
          fi
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "Release title: ${TITLE}"

      - name: Build distributions
        if: steps.tag_check.outputs.exists == 'false'
        run: bash .scripts/build_dist.sh

      - name: Build macOS .app + .dmg
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          python -m pip install -e ".[mac]"
          bash .scripts/build_app.sh

      - name: Upload dist artifacts
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.dmg

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false' && !startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.relname.outputs.title }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.dmg
          generate_release_notes: true

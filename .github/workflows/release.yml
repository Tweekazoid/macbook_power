name: Release

on:
  push:
    branches: [main]      # auto-bump + release on every merge to main
    tags:
      - "v*"              # and on manual version tags
  workflow_dispatch:      # allow manual run from GitHub UI

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a token that can push back to main (GITHUB_TOKEN is fine because
          # we set `permissions: contents: write` above; `persist-credentials`
          # defaults to true, which is what we need for the later `git push`).

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Auto-bump version (commits via GitHub API, auto-signed)
        id: bump
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        env:
          # Commits via the Contents API are auto-signed by GitHub's internal
          # web-flow key, so GITHUB_TOKEN satisfies the "signed commits" rule.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          MSG=$(git log -1 --pretty=%B)

          # Skip release entirely if the commit asks for it.
          if echo "$MSG" | grep -Eiq '\[skip release\]|\[no release\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Commit asks to skip release."
            exit 0
          fi

          # Decide bump level (default: patch).
          LEVEL=patch
          if echo "$MSG" | grep -Eq 'BREAKING CHANGE|\[major\]'; then
            LEVEL=major
          elif echo "$MSG" | grep -Eiq '\[minor\]|^feat(\(|:)'; then
            LEVEL=minor
          fi

          # Base version = latest v* tag (fallback to pyproject.toml).
          if LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null); then
            CURRENT="${LATEST_TAG#v}"
          else
            CURRENT=$(python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')
          fi
          IFS='.' read -r MAJ MIN PAT <<<"${CURRENT}"
          case "$LEVEL" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          NEW="${MAJ}.${MIN}.${PAT}"
          echo "Bumping ${CURRENT} -> ${NEW} (level=${LEVEL})"

          # --- 1. Update files in the runner so the build uses the new version
          python - <<PY
          import pathlib, re
          new = "${NEW}"
          py = pathlib.Path("pyproject.toml")
          py.write_text(re.sub(r'^version\s*=\s*".*"', f'version = "{new}"', py.read_text(), count=1, flags=re.M))
          init = pathlib.Path("src/macbook_power/__init__.py")
          init.write_text(re.sub(r'__version__\s*=\s*".*"', f'__version__ = "{new}"', init.read_text(), count=1))
          PY

          # --- 2. Commit files back to main via the Contents API
          #     (auto-signed by GitHub, passes the signed-commits rule)
          commit_file_via_api() {
            local path="$1"
            local message="$2"
            local content_b64 response sha payload

            content_b64=$(base64 < "${path}" | tr -d '\n')

            # Get current SHA for the file on main so we can update it
            sha=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/${path}?ref=main" \
              | python -c 'import sys,json; d=json.load(sys.stdin); print(d.get("sha",""))')

            # Build JSON payload via python (avoids shell quoting/brace issues)
            payload=$(MBP_MSG="${message}" MBP_CONTENT="${content_b64}" MBP_SHA="${sha}" \
              python -c 'import json,os; print(json.dumps({"message": os.environ["MBP_MSG"], "content": os.environ["MBP_CONTENT"], "sha": os.environ["MBP_SHA"], "branch": "main"}))')

            response=$(curl -sS -X PUT \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/contents/${path}" \
              --data-binary "${payload}")

            if echo "${response}" | grep -q '"commit"'; then
              echo "  committed ${path}"
            else
              echo "  FAILED to commit ${path}:"
              echo "${response}"
              exit 1
            fi
          }

          COMMIT_MSG="chore(release): v${NEW} [skip release]"
          commit_file_via_api "pyproject.toml" "${COMMIT_MSG}"
          commit_file_via_api "src/macbook_power/__init__.py" "${COMMIT_MSG}"

          # Optionally add CHANGELOG stub if missing
          if [[ -f CHANGELOG.md ]] && ! grep -q "^## v${NEW}\b" CHANGELOG.md; then
            HEADLINE=$(echo "$MSG" | head -1 | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
            python - <<PY
          import pathlib
          new = "${NEW}"
          headline = """${HEADLINE}""".strip().replace("\n", " ") or "Automated release"
          path = pathlib.Path("CHANGELOG.md")
          text = path.read_text()
          stub = f"## v{new} — {headline}\n\n- (auto-generated; edit CHANGELOG.md on main and push)\n\n"
          marker = "\n## v"
          idx = text.find(marker)
          if idx == -1:
              text = text.rstrip() + "\n\n" + stub
          else:
              text = text[:idx + 1] + stub + text[idx + 1:]
          path.write_text(text)
          PY
            commit_file_via_api "CHANGELOG.md" "${COMMIT_MSG}"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=v${NEW}" >> "$GITHUB_OUTPUT"

      - name: Resolve release version
        id: version
        if: steps.bump.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ steps.bump.outputs.version }}" ]]; then
            VERSION="${{ steps.bump.outputs.version }}"
          else
            VERSION="v$(python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Check if tag already exists
        id: tag_check
        if: steps.bump.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.version }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.version }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release name
        id: relname
        if: steps.bump.outputs.skip != 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          VER="${{ steps.version.outputs.version }}"
          HEADLINE=""
          if [[ -f CHANGELOG.md ]]; then
            HEADLINE=$(awk -v v="${VER}" '
              $0 ~ "^##[[:space:]]+"v"([[:space:]]|$)" {
                sub("^##[[:space:]]+"v"[[:space:]]*[—–-]*[[:space:]]*", "");
                print; exit
              }' CHANGELOG.md | tr -d '\r')
          fi
          if [[ -z "${HEADLINE}" ]]; then
            HEADLINE=$(git log -1 --pretty=%s)
          fi
          HEADLINE=$(echo "${HEADLINE}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
          if [[ -n "${HEADLINE}" && "${HEADLINE}" != "${VER}" ]]; then
            TITLE="MacBook Power ${VER} — ${HEADLINE}"
          else
            TITLE="MacBook Power ${VER}"
          fi
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "Release title: ${TITLE}"

      - name: Build distributions
        if: steps.bump.outputs.skip != 'true' && steps.tag_check.outputs.exists == 'false'
        run: bash .scripts/build_dist.sh

      - name: Build macOS .app + .dmg
        if: steps.bump.outputs.skip != 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          python -m pip install -e ".[mac]"
          bash .scripts/build_app.sh

      - name: Upload dist artifacts
        if: steps.bump.outputs.skip != 'true' && steps.tag_check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.dmg

      - name: Create git tag
        if: steps.bump.outputs.skip != 'true' && steps.tag_check.outputs.exists == 'false' && !startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.bump.outputs.skip != 'true' && steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.relname.outputs.title }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.dmg
          generate_release_notes: true
